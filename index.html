<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양이의 기묘한 모험</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="mainMenu">

        <div class="background"></div>

        <div class="container">

            <div class="menu">

                <h1>고양이의 기묘한 모험</h1>

                <button id="startBtn">
                    시작하기
                </button>

                <button id="optionBtn">
                    옵션
                </button>

            </div>

        </div>

        <div id="optionsScreen">

            <div class="options-box">

                <h2>옵션</h2>

                <div class="option-row">
                    <label for="volumeSlider">음량</label>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                    <span id="volumeValue">70</span>
                </div>

                <button id="closeOptionsBtn" class="simple-btn">닫기</button>

            </div>

        </div>

    </div>

    <div id="stageSelect">

        <div id="stageMapScroll">
            <div id="stageMapContent">
                <svg id="stageMapSvg"></svg>
            </div>
        </div>

        <div id="stageInfoPanel"></div>

    </div>


    <div id="gameStage">

        <div id="turnIndicator">아군의 턴</div>

        <div id="heroHud"></div>

        <!-- 캐릭터 클릭 시 뜨는 정보/액션 패널 (아군, 적군 공용) -->
        <div id="targetInfo"></div>

        <!-- 액션 버튼 위에 마우스를 올리면 뜨는 설명 -->
        <div id="actionTooltip"></div>

        <div id="battleField">
            <div class="alliance-party" id="allyParty"></div>

            <div class="enemy-party" id="enemyParty"></div>
        </div>

        <div id="battleResult" style="display:none;"></div>

    </div>


    <div id="pauseScreen">

        <div class="options-box">

            <h2>일시정지</h2>

            <button id="pauseSaveBtn" class="simple-btn">저장하기</button>

            <p id="pauseToast" style="display:none;"></p>

            <button id="pauseCloseBtn" class="simple-btn">닫기</button>

        </div>

    </div>


    <div id="fade"></div>


    <script src="common.js"></script>
    <script src="stages.js"></script>
    <script src="options.js"></script>
    <script src="cutscene.js"></script>
    <script src="stageselect.js"></script>
    <script src="battle.js"></script>
    <script src="pause.js"></script>

</body>

</html>
